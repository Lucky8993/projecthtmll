<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Catch the Box Game</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }
    h1 {
      margin-top: 20px;
    }
    #gameArea {
      width: 400px;
      height: 400px;
      margin: 20px auto;
      background-color: white;
      border: 2px solid #333;
      position: relative;
      overflow: hidden;
    }
    #box {
      width: 50px;
      height: 50px;
      background-color: red;
      position: absolute;
      cursor: pointer;
    }
    #score, #timer {
      font-size: 20px;
    }
  </style>
</head>
<body>

<h1>Catch the Box!</h1>
<p id="score">Score: 0</p>
<p id="timer">Time: 30</p>

<div id="gameArea">
  <div id="box"></div>
</div>

<script>
  const box = document.getElementById("box");
  const scoreText = document.getElementById("score");
  const timerText = document.getElementById("timer");
  const gameArea = document.getElementById("gameArea");

  let score = 0;
  let timeLeft = 30;
  let gameActive = true;

  function moveBox() {
    const maxX = gameArea.clientWidth - box.clientWidth;
    const maxY = gameArea.clientHeight - box.clientHeight;

    const randomX = Math.floor(Math.random() * maxX);
    const randomY = Math.floor(Math.random() * maxY);

    box.style.left = randomX + "px";
    box.style.top = randomY + "px";
  }

  // Move box every 2 second
  let moveInterval = setInterval(moveBox, 1000);

  // Timer countdown
  let timerInterval = setInterval(() => {
    timeLeft--;
    timerText.textContent = "Time: " + timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      clearInterval(moveInterval);
      gameActive = false;
      alert("Game Over! Your score: " + score);         
    }
  }, 1000);

  // Click event
  box.addEventListener("click", () => {
    if (!gameActive) return;

    score++;
    scoreText.textContent = "Score: " + score;
    moveBox();
  });

  // Initial position
  moveBox();
</script>

</body>
</html>
